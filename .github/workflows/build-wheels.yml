# This workflow builds bdist and sdist for Manylinux and MacOS 

name: build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-13 is an intel runner, macos-14 is apple silicon
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Disable building
          #  - on musllinux
          #  - on 32-bit archs
          #  - CPy36 wheels on all platforms
          #  - PyPy wheels on all platforms
          CIBW_SKIP: "*-musllinux* *-win32 *-manylinux_i686 cp36-* pp*"
          # Build for both Intel and Apple Silicon from the single macOS runner
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          # Use manylinux2014 (glibc >= 2.17) for maximum Linux compatibility,
          # covering Ubuntu 14.04+ and all common WSL environments.
          # The cibuildwheel v2 default (manylinux_2_28) would silently exclude
          # Ubuntu 18.04 WSL (glibc 2.27).
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014
          
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
          
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/galapy-fit
    permissions:
      id-token: write   # required for OIDC trusted-publisher auth
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all cibuildwheel artifacts (wheels + sdist) into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # To test against TestPyPI, uncomment the line below:
        # with:
        #   repository-url: https://test.pypi.org/legacy/
